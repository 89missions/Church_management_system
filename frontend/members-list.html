<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#4F46E5">
    <title>Manage Members | Winners Chapel CMS</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="stylesheet" href="./css/style.css">
    <style>
        .members-container {
            max-width: 1400px;
            margin: 80px auto 2rem;
            padding: 0 2rem;
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .search-bar {
            display: flex;
            gap: 1rem;
            flex: 1;
            max-width: 400px;
        }

        .search-bar input {
            flex: 1;
            padding: 0.8rem;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 1rem;
        }

        .add-btn {
            background: var(--primary);
            color: white;
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .members-table {
            background: white;
            border-radius: 20px;
            overflow-x: auto;
            box-shadow: var(--shadow);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 1rem;
            background: #f9fafb;
            font-weight: 600;
            color: var(--dark);
        }

        td {
            padding: 1rem;
            border-top: 1px solid #e5e7eb;
        }

        .member-row {
            cursor: pointer;
            transition: background 0.2s;
        }

        .member-row:hover {
            background: #f9fafb;
        }

        .action-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .edit-btn, .delete-btn {
            padding: 0.3rem 0.8rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .edit-btn {
            background: #10b981;
            color: white;
        }

        .delete-btn {
            background: #ef4444;
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .close-modal {
            font-size: 1.5rem;
            cursor: pointer;
        }

        .detail-row {
            display: flex;
            padding: 0.5rem 0;
            border-bottom: 1px solid #e5e7eb;
        }

        .detail-label {
            width: 140px;
            font-weight: 600;
            color: var(--dark);
        }

        .detail-value {
            flex: 1;
            color: var(--gray);
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--gray);
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--gray);
        }

        @media (max-width: 768px) {
            .members-container {
                padding: 0 1rem;
            }
            th, td {
                padding: 0.75rem;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="members-container">
        <div class="header-bar">
            <h1>📋 Manage Members</h1>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search by name, email, or phone...">
            </div>
            <a href="add-member.html" class="add-btn">+ Add New Member</a>
        </div>

        <div class="members-table">
            <div id="membersList">
                <div class="loading">Loading members...</div>
            </div>
        </div>
    </div>

    <!-- Member Details Modal -->
    <div id="memberModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Member Details</h2>
                <span class="close-modal" onclick="closeModal()">&times;</span>
            </div>
            <div id="modalBody"></div>
            <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                <button onclick="editCurrentMember()" class="edit-btn" style="padding: 0.5rem 1rem;">✏️ Edit</button>
                <button onclick="deleteCurrentMember()" class="delete-btn" style="padding: 0.5rem 1rem;">🗑️ Delete</button>
            </div>
        </div>
    </div>

    <script src="./js/auth.js"></script>
    <script src="./js/members-list.js"></script>
</body>
</html>
