<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#4F46E5">
    <title>Manage Events | Winners Chapel CMS</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="stylesheet" href="./css/style.css">
    <style>
        .events-container {
            max-width: 1400px;
            margin: 80px auto 2rem;
            padding: 0 2rem;
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .add-btn {
            background: var(--primary);
            color: white;
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        .event-card {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            transition: transform 0.3s;
            position: relative;
        }

        .event-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }

        .event-status {
            position: absolute;
            top: 1rem;
            right: 1rem;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .status-scheduled {
            background: #dbeafe;
            color: #1e40af;
        }

        .status-ongoing {
            background: #fef3c7;
            color: #92400e;
        }

        .status-completed {
            background: #d1fae5;
            color: #065f46;
        }

        .status-cancelled {
            background: #fee2e2;
            color: #991b1b;
        }

        .event-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            padding-right: 80px;
        }

        .event-datetime {
            color: var(--primary);
            font-size: 0.9rem;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .event-location {
            color: var(--gray);
            font-size: 0.9rem;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .event-description {
            color: var(--dark);
            font-size: 0.9rem;
            margin-bottom: 1rem;
            line-height: 1.4;
        }

        .event-attendees {
            font-size: 0.85rem;
            color: var(--gray);
            margin-bottom: 1rem;
            padding-top: 0.5rem;
            border-top: 1px solid #e5e7eb;
        }

        .event-actions {
            display: flex;
            gap: 0.75rem;
            justify-content: flex-end;
        }

        .edit-event, .delete-event, .view-rsvp {
            padding: 0.4rem 0.8rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .edit-event {
            background: #10b981;
            color: white;
        }

        .delete-event {
            background: #ef4444;
            color: white;
        }

        .view-rsvp {
            background: var(--primary);
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            max-width: 550px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .close-modal {
            font-size: 1.5rem;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
        }

        .save-btn {
            background: var(--primary);
            color: white;
            width: 100%;
            padding: 0.8rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 1rem;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--gray);
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--gray);
        }

        @media (max-width: 768px) {
            .events-container {
                padding: 0 1rem;
            }
            .events-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="events-container">
        <div class="header-bar">
            <h1>📅 Manage Events</h1>
            <button class="add-btn" onclick="openEventModal()">+ Create New Event</button>
        </div>

        <div id="eventsList">
            <div class="loading">Loading events...</div>
        </div>
    </div>

    <!-- Event Modal (Add/Edit) -->
    <div id="eventModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Create New Event</h2>
                <span class="close-modal" onclick="closeEventModal()">&times;</span>
            </div>
            <form id="eventForm">
                <input type="hidden" id="eventId">
                <div class="form-group">
                    <label>Event Title *</label>
                    <input type="text" id="eventTitle" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="eventDescription" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Event Date *</label>
                    <input type="date" id="eventDate" required>
                </div>
                <div class="form-group">
                    <label>Start Time</label>
                    <input type="time" id="startTime">
                </div>
                <div class="form-group">
                    <label>End Time</label>
                    <input type="time" id="endTime">
                </div>
                <div class="form-group">
                    <label>Location</label>
                    <input type="text" id="eventLocation">
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="eventStatus">
                        <option value="Scheduled">Scheduled</option>
                        <option value="Ongoing">Ongoing</option>
                        <option value="Completed">Completed</option>
                        <option value="Cancelled">Cancelled</option>
                    </select>
                </div>
                <button type="submit" class="save-btn">Save Event</button>
            </form>
        </div>
    </div>

    <!-- RSVP Modal -->
    <div id="rsvpModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Event Attendees</h2>
                <span class="close-modal" onclick="closeRsvpModal()">&times;</span>
            </div>
            <div id="rsvpList"></div>
        </div>
    </div>

    <script src="./js/auth.js"></script>
    <script src="./js/events.js"></script>
</body>
</html>
