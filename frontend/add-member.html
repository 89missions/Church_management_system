<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#4F46E5">
    <title>Add Member | Winners Chapel CMS</title>
    <link rel="manifest" href="./manifest.css">
    <link rel="stylesheet" href="./css/style.css">
    <style>
        .form-container {
            max-width: 800px;
            margin: 80px auto 2rem;
            padding: 2rem;
            background: white;
            border-radius: 20px;
            box-shadow: var(--shadow);
        }

        .form-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .form-header h1 {
            font-size: 1.8rem;
            color: var(--dark);
        }

        .back-btn {
            background: #e5e7eb;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            color: var(--dark);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--dark);
        }

        input, select, textarea {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .submit-btn {
            background: var(--primary);
            color: white;
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .submit-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .password-result {
            margin-top: 1rem;
            padding: 1rem;
            background: #f0fdf4;
            border-radius: 10px;
            display: none;
        }

        .password-result.show {
            display: block;
            animation: fadeInUp 0.3s ease;
        }

        .default-password {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary);
            font-family: monospace;
            letter-spacing: 1px;
        }

        .copy-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.3rem 0.8rem;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 0.5rem;
        }

        .alert {
            padding: 0.8rem;
            border-radius: 10px;
            margin-bottom: 1rem;
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
        }

        .alert-error {
            background: #fee2e2;
            color: #dc2626;
        }

        @media (max-width: 768px) {
            .form-container {
                margin: 60px 1rem 1rem;
                padding: 1.5rem;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="form-header">
            <h1>➕ Add New Member</h1>
            <a href="dashboard-secretary.html" class="back-btn">← Back to Dashboard</a>
        </div>

        <div id="alertMessage"></div>

        <form id="addMemberForm">
            <div class="form-row">
                <div class="form-group">
                    <label>First Name *</label>
                    <input type="text" id="firstName" required placeholder="Enter first name">
                </div>
                <div class="form-group">
                    <label>Last Name *</label>
                    <input type="text" id="lastName" required placeholder="Enter last name">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="member@church.org">
                </div>
                <div class="form-group">
                    <label>Phone Number *</label>
                    <input type="tel" id="phone" required placeholder="e.g., 0244123456">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Date of Birth</label>
                    <input type="date" id="dob">
                </div>
                <div class="form-group">
                    <label>Gender</label>
                    <select id="gender">
                        <option value="">Select</option>
                        <option value="M">Male</option>
                        <option value="F">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Address</label>
                <textarea id="address" rows="2" placeholder="Enter residential address"></textarea>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Marital Status</label>
                    <select id="maritalStatus">
                        <option value="">Select</option>
                        <option value="Single">Single</option>
                        <option value="Married">Married</option>
                        <option value="Widowed">Widowed</option>
                        <option value="Divorced">Divorced</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Occupation</label>
                    <input type="text" id="occupation" placeholder="e.g., Teacher, Engineer">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Emergency Contact Name</label>
                    <input type="text" id="emergencyName" placeholder="Full name">
                </div>
                <div class="form-group">
                    <label>Emergency Contact Phone</label>
                    <input type="tel" id="emergencyPhone" placeholder="Phone number">
                </div>
            </div>

            <div class="form-group">
                <label>Assign Positions (Optional)</label>
                <select id="positions" multiple size="3">
                    <option value="member">Regular Member (Default)</option>
                    <option value="usher">Usher</option>
                    <option value="small_group_leader">Small Group Leader</option>
                    <option value="worship_leader">Worship Leader</option>
                    <option value="treasurer">Treasurer</option>
                    <option value="secretary">Secretary</option>
                    <option value="pastor">Pastor</option>
                    <option value="elder">Elder</option>
                </select>
                <small style="color: var(--gray);">Hold Ctrl/Cmd to select multiple positions</small>
            </div>

            <button type="submit" class="submit-btn">Register Member</button>
        </form>

        <div id="passwordResult" class="password-result">
            <strong>✅ Member Registered Successfully!</strong><br>
            Default Password: <span class="default-password" id="defaultPassword"></span>
            <button class="copy-btn" onclick="copyPassword()">Copy</button>
            <p style="font-size: 0.85rem; margin-top: 0.5rem;">
                ⚠️ Share this password with the member. They must change it after first login.
            </p>
        </div>
    </div>

    <script type="module" src="./js/auth.js"></script>
    <script type="module" src="./js/add-member.js"></script>
</body>
</html>
